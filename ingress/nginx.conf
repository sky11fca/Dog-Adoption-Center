worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limiting: max 10 requests/second per IP, burst of 20
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;

    # Redis upstream for session caching (used by downstream services)
    # Accessible at redis:6379 within the Docker network

    upstream api_backend {
        server api:8080;
    }

    upstream frontend_app {
        server frontend:80;
    }

    upstream review_backend {
        server review-service:8080;
    }

    upstream analytics_backend {
        server analytics-service:8080;
    }

    server {
        listen 80;

        # API gateway — /api/* routes to user management backend (strips /api prefix)
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;

            proxy_pass         http://api_backend/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Review service — /api/reviews/* → review-service /reviews/*
        location /api/reviews/ {
            limit_req zone=api_zone burst=20 nodelay;

            proxy_pass         http://review_backend/reviews/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Analytics service — /api/analytics/* → analytics-service /analytics/*
        location /api/analytics/ {
            limit_req zone=api_zone burst=20 nodelay;

            proxy_pass         http://analytics_backend/analytics/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # SPA — all other traffic goes to the frontend
        location / {
            proxy_pass         http://frontend_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
