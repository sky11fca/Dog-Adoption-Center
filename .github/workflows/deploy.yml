name: Build and Deploy to Azure

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write # Required for requesting the JWT
  contents: read  # Required for actions/checkout

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Build and Push User Management API
        run: |
          docker build -t $ACR_NAME.azurecr.io/user-api:${{ github.sha }} -f UserManagementApi/UserManagementApi/Dockerfile ./UserManagementApi
          docker push $ACR_NAME.azurecr.io/user-api:${{ github.sha }}

      - name: Build and Push Pet Management API
        run: |
          docker build -t $ACR_NAME.azurecr.io/pet-api:${{ github.sha }} -f PetManagementApi/PetManagementApi/Dockerfile ./PetManagementApi
          docker push $ACR_NAME.azurecr.io/pet-api:${{ github.sha }}

      - name: Build and Push Adoption Manager
        run: |
          docker build -t $ACR_NAME.azurecr.io/adoption-api:${{ github.sha }} -f AdoptionManager/AdoptionManager.Api/Dockerfile ./AdoptionManager
          docker push $ACR_NAME.azurecr.io/adoption-api:${{ github.sha }}

      - name: Build and Push Review Service
        run: |
          docker build -t $ACR_NAME.azurecr.io/review-api:${{ github.sha }} -f ReviewService/ReviewService/Dockerfile ./ReviewService
          docker push $ACR_NAME.azurecr.io/review-api:${{ github.sha }}

      - name: Build and Push Notification Service
        run: |
          docker build -t $ACR_NAME.azurecr.io/notification-service:${{ github.sha }} -f NotificationService/NotificationService/Dockerfile ./NotificationService
          docker push $ACR_NAME.azurecr.io/notification-service:${{ github.sha }}

      - name: Build and Push Analytics Service
        run: |
          docker build -t $ACR_NAME.azurecr.io/analytics-service:${{ github.sha }} -f AnalyticsService/AnalyticsService/Dockerfile ./AnalyticsService
          docker push $ACR_NAME.azurecr.io/analytics-service:${{ github.sha }}

      - name: Build and Push Frontend
        run: |
          docker build -t $ACR_NAME.azurecr.io/frontend:${{ github.sha }} -f frontend/Dockerfile ./frontend
          docker push $ACR_NAME.azurecr.io/frontend:${{ github.sha }}

      - name: Build and Push Ingress Gateway
        run: |
          docker build -t $ACR_NAME.azurecr.io/ingress-gateway:${{ github.sha }} -f ingress/Dockerfile ./ingress
          docker push $ACR_NAME.azurecr.io/ingress-gateway:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: az aks get-credentials --name $AKS_CLUSTER_NAME --resource-group $AKS_RESOURCE_GROUP

      - name: Update Manifests with SHA
        run: |
          sed -i "s|{{IMAGE_TAG}}|${{ github.sha }}|g" k8s/*.yaml
          sed -i "s|{{ACR_NAME}}|$ACR_NAME|g" k8s/*.yaml

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/
