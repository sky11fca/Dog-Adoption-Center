services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ./UserManagementApi
      dockerfile: UserManagementApi/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Jwt__Key=${JWT_KEY}
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  ingress:
    image: nginx:alpine
    volumes:
      - ./ingress/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  pet-api:
    build:
      context: ./PetManagementApi
      dockerfile: PetManagementApi/Dockerfile
    environment:
      - ConnectionStrings__PetDatabase=${PET_DB_CONNECTION_STRING}
      - BlobStorage__AccountName=${BLOB_ACCOUNT_NAME}
      - BlobStorage__AccountKey=${BLOB_ACCOUNT_KEY}
      - BlobStorage__ContainerName=${BLOB_CONTAINER_NAME:-pet-photos}
      - BlobStorage__PublicBaseUrl=${BLOB_PUBLIC_BASE_URL}
      - ASPNETCORE_ENVIRONMENT=Development
      - PetManagement__AutoCreateDatabase=true
    ports:
      - "8082:8080"
    restart: unless-stopped

volumes:
  db_data: