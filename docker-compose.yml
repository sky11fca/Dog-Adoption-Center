services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ./UserManagementApi
      dockerfile: UserManagementApi/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Jwt__Key=${JWT_KEY}
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  ingress:
    image: nginx:alpine
    volumes:
      - ./ingress/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  pet-api:
    build:
      context: ./PetManagementApi
      dockerfile: PetManagementApi/Dockerfile
    environment:
      - ConnectionStrings__PetDatabase=${PET_DB_CONNECTION_STRING}
      - BlobStorage__AccountName=${BLOB_ACCOUNT_NAME}
      - BlobStorage__AccountKey=${BLOB_ACCOUNT_KEY}
      - BlobStorage__ContainerName=${BLOB_CONTAINER_NAME:-pet-photos}
      - BlobStorage__PublicBaseUrl=${BLOB_PUBLIC_BASE_URL}
      - ASPNETCORE_ENVIRONMENT=Development
      - PetManagement__AutoCreateDatabase=true
    ports:
      - "8082:8080"
    restart: unless-stopped

  notification-service:
    build:
      context: ./NotificationService
      dockerfile: NotificationService/Dockerfile
    environment:
      - ServiceBus__ConnectionString=${SERVICE_BUS_CONNECTION_STRING}
      - ServiceBus__ApplicationStatusQueueName=${SERVICE_BUS_QUEUE_NAME:-application-status-changed}
      - Smtp__Host=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__FromAddress=${SMTP_FROM_ADDRESS:-noreply@dogadoption.example.com}
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8083:8080"
    restart: unless-stopped

  review-service:
    build:
      context: ./ReviewService
      dockerfile: ReviewService/Dockerfile
    environment:
      - ConnectionStrings__ReviewDatabase=${REVIEW_DB_CONNECTION_STRING}
      - ReviewService__AutoCreateDatabase=true
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
    ports:
      - "8084:8080"
    restart: unless-stopped

  analytics-service:
    build:
      context: ./AnalyticsService
      dockerfile: AnalyticsService/Dockerfile
    environment:
      - ApplicationInsights__ConnectionString=${APP_INSIGHTS_CONNECTION_STRING}
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "8085:8080"
    restart: unless-stopped

volumes:
  db_data: