apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-api
  template:
    metadata:
      labels:
        app: user-api
    spec:
      containers:
      - name: user-api
        image: {{ACR_NAME}}.azurecr.io/user-api:{{IMAGE_TAG}}
        ports:
        - containerPort: 8080
        env:
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: USER_DB_CONNECTION
        - name: Jwt__Key
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_KEY
        - name: ASPNETCORE_HTTP_PORTS
          value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: user-api
  ports:
  - port: 8080
    targetPort: 8080
---
