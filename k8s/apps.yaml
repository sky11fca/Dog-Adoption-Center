apiVersion: apps/v1
kind: Deployment
metadata:
  name: adoption-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adoption-api
  template:
    metadata:
      labels:
        app: adoption-api
    spec:
      containers:
      - name: adoption-api
        image: {{ACR_NAME}}.azurecr.io/adoption-api:{{IMAGE_TAG}}
        ports:
        - containerPort: 8086
        env:
        - name: COSMOS_URI
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: COSMOS_URI
        - name: COSMOS_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: COSMOS_KEY
        - name: SERVICE_BUS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: SERVICE_BUS_CONNECTION
        - name: SERVICE_BUS_QUEUE_NAME
          value: "application-status-changed"
        - name: ASPNETCORE_HTTP_PORTS
          value: "8086"
---
apiVersion: v1
kind: Service
metadata:
  name: adoption-manager
spec:
  selector:
    app: adoption-api
  ports:
  - port: 8086
    targetPort: 8086
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      containers:
      - name: review-service
        image: {{ACR_NAME}}.azurecr.io/review-api:{{IMAGE_TAG}}
        ports:
        - containerPort: 8084
        env:
        - name: ConnectionStrings__ReviewDatabase
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: REVIEW_DB_CONNECTION
        - name: ReviewService__AutoCreateDatabase
          value: "true"
        - name: ASPNETCORE_HTTP_PORTS
          value: "8084"
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
spec:
  selector:
    app: review-service
  ports:
  - port: 8084
    targetPort: 8084
